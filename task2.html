<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Image Gallery</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Filter Buttons */
    .filters {
      text-align: center;
      margin-bottom: 20px;
    }

    .filters button {
      padding: 10px 18px;
      margin: 5px;
      border: none;
      cursor: pointer;
      background: #333;
      color: white;
      border-radius: 5px;
      transition: 0.3s;
    }

    .filters button:hover,
    .filters button.active {
      background: #ff9800;
    }

    /* Gallery Grid */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      transition: transform 0.5s ease, filter 0.5s ease;
      display: block;
    }

    /* Hover Effect */
    .gallery-item:hover img {
      transform: scale(1.1);
      filter: brightness(80%);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .lightbox img {
      max-width: 80%;
      max-height: 80%;
      border-radius: 10px;
      animation: zoomIn 0.4s ease;
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.7);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Navigation Buttons */
    .lightbox button {
      position: absolute;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 2rem;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    .lightbox button:hover {
      background: rgba(255,255,255,0.5);
    }

    .prev {
      left: 30px;
    }

    .next {
      right: 30px;
    }

    .close {
      top: 20px;
      right: 20px;
      font-size: 2rem;
    }

    /* Responsive */
    @media(max-width: 768px) {
      .lightbox img {
        max-width: 95%;
      }

      .lightbox button {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <h1>Responsive Image Gallery</h1>

  <!-- Filter Buttons -->
  <div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="animals">Animals</button>
  </div>

  <!-- Gallery -->
<div class="gallery">

  <!-- Nature -->
  <div class="gallery-item nature">
    <img src="https://picsum.photos/id/1015/600/400" alt="Nature">
  </div>

  <div class="gallery-item nature">
    <img src="https://picsum.photos/id/1039/600/400" alt="Nature">
  </div>

  <div class="gallery-item nature">
    <img src="https://picsum.photos/id/1040/600/400" alt="Nature">
  </div>

  <div class="gallery-item nature">
    <img src="https://picsum.photos/id/1084/600/400" alt="Nature">
  </div>

  <div class="gallery-item nature">
    <img src="https://picsum.photos/id/1018/600/400" alt="Nature">
  </div>

  <!-- City -->
  <div class="gallery-item city">
    <img src="https://picsum.photos/id/1011/600/400" alt="City">
  </div>

  <div class="gallery-item city">
    <img src="https://picsum.photos/id/1043/600/400" alt="City">
  </div>

  <div class="gallery-item city">
    <img src="https://picsum.photos/id/1050/600/400" alt="City">
  </div>

  <div class="gallery-item city">
    <img src="https://picsum.photos/id/1060/600/400" alt="City">
  </div>

  <div class="gallery-item city">
    <img src="https://picsum.photos/id/1031/600/400" alt="City">
  </div>

  <!-- Animals -->
  <div class="gallery-item animals">
    <img src="https://picsum.photos/id/1025/600/400" alt="Animal">
  </div>

  <div class="gallery-item animals">
    <img src="https://picsum.photos/id/1062/600/400" alt="Animal">
  </div>

  <div class="gallery-item animals">
    <img src="https://picsum.photos/id/1074/600/400" alt="Animal">
  </div>

  <div class="gallery-item animals">
    <img src="https://picsum.photos/id/1024/600/400" alt="Animal">
  </div>

  <div class="gallery-item animals">
    <img src="https://picsum.photos/id/237/600/400" alt="Animal">
  </div>



  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="close">&times;</button>
    <button class="prev">&#10094;</button>
    <img src="" alt="Preview">
    <button class="next">&#10095;</button>
  </div>

  <script>
    const galleryItems = document.querySelectorAll(".gallery-item");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");
    const closeBtn = document.querySelector(".close");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");

    let currentIndex = 0;
    let images = [];

    // Store images
    galleryItems.forEach((item, index) => {
      images.push(item.querySelector("img").src);

      item.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
      });
    });

    // Show current image
    function showImage() {
      lightboxImg.src = images[currentIndex];
    }

    // Next Image
    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % images.length;
      showImage();
    });

    // Previous Image
    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      showImage();
    });

    // Close Lightbox
    closeBtn.addEventListener("click", () => {
      lightbox.style.display = "none";
    });

    // Close on outside click
    lightbox.addEventListener("click", (e) => {
      if (e.target !== lightboxImg &&
          e.target !== nextBtn &&
          e.target !== prevBtn) {
        lightbox.style.display = "none";
      }
    });

    // Filters
    const filterButtons = document.querySelectorAll(".filters button");

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {

        document.querySelector(".filters .active")
          .classList.remove("active");

        button.classList.add("active");

        const filter = button.dataset.filter;

        galleryItems.forEach(item => {
          if (filter === "all" || item.classList.contains(filter)) {
            item.style.display = "block";
          } else {
            item.style.display = "none";
          }
        });
      });
    });
  </script>

</body>
</html>
